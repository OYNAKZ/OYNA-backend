name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci-test.db
      JWT_SECRET_KEY: ci-test-secret
      RESERVATION_HOLD_TTL_SECONDS: 900
      PAYMENT_PROVIDER_DEFAULT: fake
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Alembic upgrade smoke test
        run: alembic upgrade head
      - name: Test
        run: python -m pytest app/tests
      - name: Docker build smoke test
        run: docker build -t oyna-backend-ci .
